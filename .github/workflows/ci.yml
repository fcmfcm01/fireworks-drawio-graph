name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

      - name: Check if version already published
        id: check
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG}@${VER}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VER" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VER already published, skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version $VER not yet published, proceeding."
          fi

      - name: Debug npm auth
        if: steps.check.outputs.published == 'false'
        run: 'echo "Token length: $(echo "$NODE_AUTH_TOKEN" | wc -c)"'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

- name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        run: |
          VER=$(node -p "require('./package.json').version")
          TAG="v${VER}"
          if git tag -l "$TAG" | grep -q .; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
